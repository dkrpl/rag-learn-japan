name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_test_password
          MYSQL_DATABASE: nihongo_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_test_password --silent"
          --health-interval=5s --health-timeout=5s --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=20

    env:
      ENVIRONMENT: test
      DATABASE_URL: mysql+pymysql://test_user:test_password@127.0.0.1:3306/nihongo_test
      TEST_DATABASE_URL: mysql+pymysql://test_user:test_password@127.0.0.1:3306/nihongo_test
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-test-secret-key-with-at-least-thirty-two-characters
      CORS_ORIGINS: '["http://localhost:3000"]'
      ALLOWED_HOSTS: '["localhost","127.0.0.1","testserver"]'
      AI_PROVIDER: disabled
      TTS_PROVIDER: disabled

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Lint and format
        run: |
          python -m ruff check app tests scripts
          python -m ruff format --check app tests scripts
      - name: Validate migration
        run: alembic upgrade head
      - name: Test with coverage
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml
      - name: Validate generated API documentation
        run: python scripts/generate_api_docs.py --check
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt pip-audit
      - run: pip-audit

  container:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nihongo-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
