name: CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///./.pytest_tmp/ci.sqlite3
          SECRET_KEY: pytest-secret-key-with-at-least-thirty-two-characters
          REDIS_URL: redis://127.0.0.1:6379/15
          READINESS_CHECK_REDIS: "false"
          CORS_ORIGINS: '["http://testserver"]'
          ALLOWED_HOSTS: '["testserver","localhost","127.0.0.1"]'
          ENABLE_METRICS: "false"
          AI_PROVIDER: disabled
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-v1/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Build
        run: npm run build
