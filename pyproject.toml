[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["venv", "data/uploads", "uploads"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = [
    "tests",
]

[tool.coverage.run]
branch = true
source = ["app"]
omit = ["app/tasks/*", "app/worker.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 75
